<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>world-site</title>
  <style>
    body { background-color: #091f2e; color: #ffffff; font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; perspective: 1200px; }
    .card { background-color: #0d3a52; padding: 50px; border-radius: 12px; border: 1px solid #58b8d4; box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(88, 184, 212, 0.2); transform-style: preserve-3d; transition: transform 0.1s; max-width: 600px; width: 90%; text-align: center; }
    .card h1 { color: #58b8d4; margin: 0 0 20px 0; font-size: 2.5em; transform: translateZ(60px); text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
    .card p { transform: translateZ(40px); line-height: 1.6; font-size: 1.1em; margin-bottom: 30px; }
    .btn { display: inline-block; padding: 12px 24px; background-color: #58b8d4; color: #091f2e; text-decoration: none; border-radius: 6px; font-weight: bold; transform: translateZ(50px); transition: background-color 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    .btn:hover { background-color: #ffffff; color: #091f2e; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <h1>world-site</h1>
    <p>frontend application demonstrating modular ui components and state management. built to handle async data flows and responsive layouts without bloated libraries.</p>
    <a href="https://github.com/ZiadtahaM/world-site" class="btn">view source</a>
  </div>
  <script>
    const card = document.getElementById('card');
    document.addEventListener('mousemove', (e) => {
      const xAxis = (window.innerWidth / 2 - e.pageX) / 20;
      const yAxis = (window.innerHeight / 2 - e.pageY) / 20;
      card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });
  </script>
</body>
</html>
